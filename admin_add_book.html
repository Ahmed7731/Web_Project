<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Add book</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/admin_add_book.css" />
    <script src="js/admin_add_book.js"></script>
  </head>
  <body>
    <div class="main">
      <header>
        <h1>Library Management System</h1>
        <hr />
<nav>
<a href="home.html">Home</a> |
<a href="admin_add_book.html">Add Book</a> |
<a href="admin_edit_book.html">Edit Book</a> |
<a href="admin_manage_books.html">Manage Library</a>|
<a href="admin_view_books.html">View books</a>
</nav>
        <hr />
      </header>

      <main class="main_content">
        <h2>Add book</h2>

        <p class="instructions">
          Add multiple books at once. click add book then, type in the data.
          Once finished click submit to add all books at once.
        </p>

        <form id="submit_form">
          <table id="add_table" class="table_main">
            <thead id="table_head">
              <tr>
                <th>Book Name</th>
                <th>Author</th>
                <th>Category</th>
                <th>Count</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="table_body">
              <tr class="tr_input">
                <td><input type="text" name="Name" placeholder="name" /></td>
                <td>
                  <input type="text" name="Author" placeholder="author" />
                </td>
                <td>
                  <input type="text" name="Category" placeholder="category" />
                </td>
                <td>
                  <input
                    type="number"
                    name="Count"
                    placeholder="count"
                    min="1"
                  />
                </td>
                <td>
                  <button
                    type="button"
                    class="DeleteBtn"
                    onclick="removeBook(this)"
                  >
                    delete
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
          <br/>
          <center>
          <div class="sumbit_section">
          <button type="button" id="add_book" onclick="addBook()">
            Add another book
          </button>
          <button type="button" id="submit_all_button" onclick="">Submit All</button>
              </div>
          </center>

        </form>
        <center>
   
        <footer>© 2026 Library Management System</footer>
        </center>

      </main>
    </div>
         <hr />
  </body>
</html>
