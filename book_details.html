<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book record</title>
    <link rel="stylesheet" href="book_details.css">
</head>
<body>
    <div id="wrapper">
        <header>
            <nav>
                <a href="available.html">[ back to available books ]</a>
            </nav>
            <hr>
        </header>

        <section id="details">
            <img id = "thumbnail" src="https://minecraft.wiki/images/Book_JE2_BE2.png?caac6&format=original" alt="book icon" class="icon">
            
            <h1 id="title">book title</h1>
            <p class="status">status: not owned</p>
            <h2 id="author">by author name</h2>
            <div class="info">
                <p id = "date"></p>
                <p id = "isbn"></p>
                <p id = "categories"></p>
            </div>

            <div class="desc">
                <h3>description</h3>
                <p id = "longDesc">work in progress (wip)</p>
            </div>

            <button id="btn" class="action">request item</button>
        </section>

        <footer>
            <hr>
            <p>system ver. 1972 | &copy; 2026</p>
        </footer>
    </div>
    <script type = "module" src="utils.js"></script>
    <script type = "module" src="book_details.js"></script>
</body>
</html>

</html>
