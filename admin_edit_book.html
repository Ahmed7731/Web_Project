<html>

    <title>Edit book</title>

    <link rel="stylesheet" href="css/admin_edit_book.css" />
  </head>
  <center>
    <h1>Library Management System</h1>
    <br />
    <h2>Admin</h2>
  </center>

  <hr />

  <center>
    <nav>
      <a href="home.html">Home</a> |
      <a href="admin_add_book.html">Add Book</a> |
      <a href="admin_edit_book.html">Edit Book</a> |
      <a href="admin_manage_books.html">Manage Library</a>|
      <a href="admin_view_books.html">View books</a>|
      <a href="home.html">Logout</a>
    </nav>
  </center>

  <hr />

  <center>
    <form>
      <h3>Select a Book to Edit</h3>
      <div class="form_layout">
        <div class="left_form">
          <p>Select Book</p>
          <select id="bookSelect">
            <option></option>
          </select>
          <br /><br />
          <h3>Edit Book Details</h3>

          <p>Book ID</p>
          <input type="text" id="bookId" placeholder="Book ID" />

          <p>Book Name</p>
          <input type="text" id="bookName" placeholder="Book Name" />

          <p>Author</p>
          <input type="text" id="author" placeholder="Author" />

          <p>Category</p>
          <input type="text" id="category" placeholder="Category" />

          <p>Description</p>
          <textarea
            id="description"
            placeholder="Book description"
            style="height: 100px"
          ></textarea>
        </div>
        <div class="right_form">
          <p>Cover</p>
          <input
            type="text"
            id="thumbnailURL"
            placeholder="Paste image URL here"
          />
          <div class="image_preview_container">
            <img
              id="thumbnailPreview"
              alt="Book  Cover"
              style="display: none"
            />
            <span id="imagePlaceHolder"> No Image selected</span>
          </div>
          <input id="change-image-btn" type="button" value="Change Image" />
        </div>
      </div>
      <input type="submit" value="Submit" />
    </form>
  </center>
  >

</html>
