<center>
    <h2>Select a Book to Edit</h2>

    <form>
        <p>Select Book</p>
        <select id="bookSelect">
            <option>Book 1</option>
            <option>Book 2</option>
            <option>Book 3</option>
            <option>Book 4</option>
        </select>
        <br><br>
        <h3>Edit Book Details</h3>
        
        <p>Book ID</p>
        
        <input type="text" id="bookId" placeholder="Book ID">

        <p>Book Name</p>
        
        <input type="text" id="bookName" placeholder="Book Name">
        
        <p>Author</p>
        
        <input type="text" id="author" placeholder="Author">
        
        <p>Category</p>

        <input type="text" id="category" placeholder="Category">
        <p>Description</p>
        <textarea id="description" rows="5" cols="50" placeholder="Enter Book description"></textarea>
        <br><br>
        <input type="submit" value="Submit">
    </form>
</center>>
