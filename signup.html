<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>
<center>
<h1>Library Management System</h1>
<hr>
<nav>
    <a href="home.html">Home</a> |
    <a href="login.html">Login</a> |
    <a href="signup.html">Sign Up</a>
</nav>
<hr>
<h2>Sign Up</h2>
<form novalidate>
    <!-- Username -->
    <label for="username">Username</label><br>
    <input type="text" id="username" name="username" placeholder="Enter username"><br><br>

        <p class="error" id="username-error"></p>

    <!-- Email -->
    <label for="email">Email</label><br>
    <input type="email" id="email" name="email" placeholder="Enter email address"><br><br>

     <p class="error" id="email-error"></p>

    <!-- Password -->
<label for="password">Password</label>

<div class="password-container">
    <input type="password" id="password" placeholder="Enter password">
    <button type="button" id="show1">Show</button>
</div>

<p class="error" id="password-error"></p>

<br>

<!-- Confirm Password -->
<label for="confirm_password">Confirm Password</label>

<div class="password-container">
    <input type="password" id="confirm_password" placeholder="Re-enter password">
    <button type="button" id="show2">Show</button>
</div>
<p class="error" id="confirm-password-error"></p>

    Is Admin:
    <input type="radio" id="admin_yes" name="is_admin" value="1">
    <label for="admin_yes">Yes</label>

    <input type="radio" id="admin_no" name="is_admin" value="0">
    <label for="admin_no">No</label>
    <p class="error" id="admin-error">
        
    </p>

    <br><br>

    <input type="submit" value="Sign Up" id="signup-Btn">
</form>
<hr>
        <p>© 2026 Library Management System</p>
</center>
<script src="js/signup.js"></script>
</body>
</html>
