<hr>

<h2>Sign Up</h2>

<form action="signup.php" method="post">

    <label for="username">Username</label><br>
    <input type="text" id="username" name="username" placeholder="Enter username" required><br><br>

    <label for="email">Email</label><br>
    <input type="email" id="email" name="email" placeholder="Enter email address" required><br><br>

    <label for="password">Password</label><br>
    <input type="password" id="password" name="password" placeholder="Enter password" required minlength="6"><br><br>

    <label for="confirm_password">Confirm Password</label><br>
    <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required><br><br>

    Is Admin:
    <input type="radio" id="admin_yes" name="is_admin" value="1" required>
    <label for="admin_yes">Yes</label>

    <input type="radio" id="admin_no" name="is_admin" value="0">
    <label for="admin_no">No</label>

    <br><br>

    <input type="submit" value="Sign Up">
</form>

</body>
</html>
